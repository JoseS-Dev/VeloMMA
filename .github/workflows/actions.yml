name: VeloMMA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres-test:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'test_user' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'test_password' }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'test_db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ── Configuración de pnpm + Node ───────────────────
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # O la versión exacta que uses (evita secrets para esto)

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Se recomienda Node LTS actual
          cache: pnpm
          cache-dependency-path: ./backend/pnpm-lock.yaml

      # ── Instalación ───────────────────────────────────
      - name: Instalar dependencias (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # ── Generación de código ──────────────────────────
      - name: Generar cliente de Prisma
        run: pnpm prisma generate

      - name: Validar esquema de Prisma
        run: pnpm prisma:validate

      # ── Fast Fail Check (Validaciones rápidas) ─────────
      - name: TypeScript type check
        run: pnpm typecheck

      # ── Preparar Entorno ──────────────────────────────
      - name: Crear archivo .env.test
        run: |
          cat << 'EOF' > .env.test
          DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER || 'test_user' }}:${{ secrets.POSTGRES_PASSWORD || 'test_password' }}@localhost:5432/${{ secrets.POSTGRES_DB || 'test_db' }}?schema=public"
          PORT=2300
          NODE_ENV="test"
          BASE_PATH="/api/v1"
          JWT_SECRET="test-jwt-secret-min-32-characters-1234567890"
          API_SECRET_KEY="test-api-key-16chars"
          COOKIE_SECRET="test-cookie-secret-min-32-characters-123456789"
          CORS_ORIGIN="http://localhost:5173"
          REDIS_URL="redis://localhost:6379"
          REDIS_PORT=6379
          REDIS_ENV=false
          LIMIT_READ_WINDOW_MS=1
          LIMIT_READ_MAX=999999
          LIMIT_WRITE_WINDOW_MS=1
          LIMIT_WRITE_MAX=99999
          EOF

      # Esperar brevemente a que el puerto del host acepte conexiones de Postgres
      - name: Esperar disponibilidad de PostgreSQL
        run: |
          until nc -z -v -w30 localhost 5432; do
            echo "Esperando conexión al puerto 5432 de Postgres..."
            sleep 1
          done

      # ── Sincronización e Integración ──────────────────
      - name: Sincronizar Base de Datos de Pruebas
        run: pnpm prisma db push

      # ── Ejecución de Tests ────────────────────────────
      - name: Ejecutar pruebas unitarias
        run: pnpm test
        env:
          NODE_OPTIONS: --experimental-vm-modules

      # ── Compilación Final ─────────────────────────────
      - name: Compilar TypeScript
        run: pnpm build