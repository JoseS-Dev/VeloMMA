services:
  # 1. PostgreSQL
  db:
    image: postgres:17-alpine 
    container_name: velomma_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER-velomma}       
      - POSTGRES_PASSWORD=${DB_PASSWORD-velomma}
      - POSTGRES_DB=${DB_NAME-velomma}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - velomma_network

  # 2. PgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: velomma_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL-admin@velomma.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD-velomma}
    ports:
      - "5050:80"
    networks:
      - velomma_network
    depends_on:
      - db

  # 3. Redis
  redis_velomma:
    image: redis:7-alpine
    container_name: velomma_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - velomma_network
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  # 4. Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER-velomma}:${DB_PASSWORD-velomma}@db:5432/${DB_NAME-velomma}?schema=public
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/generated
    ports:
      - "${PORT:-5300}:${PORT:-5300}"
    networks:
      - velomma_network 
    depends_on:
      - db

volumes:
  postgres_data:

networks:
  velomma_network:
    driver: bridge